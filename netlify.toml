[build]
  base    = "src"
  command = "npm run build"
  publish = "out"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/legal/:slug"
  to     = "https://legalhub.pecuvate.com/share/empowr/org/:slug"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
